<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 595 842" width="595" height="842" style="background: white">
  <title>Berlin Double-Decker Bus Coloring Page for Kids</title>

  <!-- ============================================ -->
  <!-- BUS BODY -->
  <!-- ============================================ -->

  <!-- Lower deck body -->
  <path d="M80,520 L80,420 Q80,410 90,410 L490,410 Q510,410 515,420 L520,440 L520,520" stroke="#2C2420" fill="none" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Upper deck body -->
  <path d="M80,410 L80,260 Q80,250 90,250 L480,250 Q490,250 490,260 L490,410" stroke="#2C2420" fill="none" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Divider line between decks -->
  <line x1="80" y1="410" x2="520" y2="410" stroke="#2C2420" fill="none" stroke-width="3.5" stroke-linecap="round"/>

  <!-- Roof line -->
  <path d="M85,250 Q85,238 100,235 L470,235 Q485,238 485,250" stroke="#2C2420" fill="none" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Bottom of bus -->
  <line x1="80" y1="520" x2="520" y2="520" stroke="#2C2420" fill="none" stroke-width="4" stroke-linecap="round"/>

  <!-- ============================================ -->
  <!-- UPPER DECK WINDOWS (5 windows) -->
  <!-- ============================================ -->
  <rect x="100" y="270" width="65" height="55" rx="8" stroke="#2C2420" fill="none" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"/>
  <rect x="180" y="270" width="65" height="55" rx="8" stroke="#2C2420" fill="none" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"/>
  <rect x="260" y="270" width="65" height="55" rx="8" stroke="#2C2420" fill="none" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"/>
  <rect x="340" y="270" width="65" height="55" rx="8" stroke="#2C2420" fill="none" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"/>
  <rect x="420" y="270" width="55" height="55" rx="8" stroke="#2C2420" fill="none" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Upper deck passengers (stick figure heads in windows) -->
  <!-- Window 1 passenger -->
  <circle cx="132" cy="310" r="8" stroke="#2C2420" fill="none" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
  <line x1="132" y1="318" x2="132" y2="325" stroke="#2C2420" fill="none" stroke-width="2" stroke-linecap="round"/>

  <!-- Window 3 passenger -->
  <circle cx="292" cy="310" r="8" stroke="#2C2420" fill="none" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
  <line x1="292" y1="318" x2="292" y2="325" stroke="#2C2420" fill="none" stroke-width="2" stroke-linecap="round"/>
  <!-- Little wave hand -->
  <path d="M300,318 L308,312" stroke="#2C2420" fill="none" stroke-width="2" stroke-linecap="round"/>

  <!-- Window 5 passenger (child, smaller) -->
  <circle cx="447" cy="312" r="6" stroke="#2C2420" fill="none" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
  <line x1="447" y1="318" x2="447" y2="325" stroke="#2C2420" fill="none" stroke-width="2" stroke-linecap="round"/>

  <!-- Upper deck seat backs (visible between windows) -->
  <line x1="100" y1="340" x2="165" y2="340" stroke="#2C2420" fill="none" stroke-width="2" stroke-linecap="round"/>
  <line x1="180" y1="340" x2="245" y2="340" stroke="#2C2420" fill="none" stroke-width="2" stroke-linecap="round"/>
  <line x1="260" y1="340" x2="325" y2="340" stroke="#2C2420" fill="none" stroke-width="2" stroke-linecap="round"/>
  <line x1="340" y1="340" x2="405" y2="340" stroke="#2C2420" fill="none" stroke-width="2" stroke-linecap="round"/>

  <!-- ============================================ -->
  <!-- LOWER DECK WINDOWS (4 windows + door) -->
  <!-- ============================================ -->

  <!-- Door (front, double door with handle) -->
  <rect x="95" y="430" width="50" height="85" rx="5" stroke="#2C2420" fill="none" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Door divider -->
  <line x1="120" y1="430" x2="120" y2="515" stroke="#2C2420" fill="none" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Door windows -->
  <rect x="100" y="435" width="16" height="30" rx="3" stroke="#2C2420" fill="none" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
  <rect x="125" y="435" width="16" height="30" rx="3" stroke="#2C2420" fill="none" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Door step -->
  <line x1="95" y1="515" x2="145" y2="515" stroke="#2C2420" fill="none" stroke-width="2" stroke-linecap="round"/>

  <!-- Window 1 -->
  <rect x="160" y="430" width="65" height="50" rx="8" stroke="#2C2420" fill="none" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Window 2 -->
  <rect x="240" y="430" width="65" height="50" rx="8" stroke="#2C2420" fill="none" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Window 3 -->
  <rect x="320" y="430" width="65" height="50" rx="8" stroke="#2C2420" fill="none" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Window 4 -->
  <rect x="400" y="430" width="65" height="50" rx="8" stroke="#2C2420" fill="none" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Lower deck passengers -->
  <!-- Window 2 passenger -->
  <circle cx="272" cy="450" r="7" stroke="#2C2420" fill="none" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
  <line x1="272" y1="457" x2="272" y2="468" stroke="#2C2420" fill="none" stroke-width="2" stroke-linecap="round"/>

  <!-- Window 4 passenger -->
  <circle cx="432" cy="450" r="7" stroke="#2C2420" fill="none" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
  <line x1="432" y1="457" x2="432" y2="468" stroke="#2C2420" fill="none" stroke-width="2" stroke-linecap="round"/>

  <!-- ============================================ -->
  <!-- FRONT OF BUS (windshield area, angled) -->
  <!-- ============================================ -->

  <!-- Front windshield (large, slightly curved) -->
  <path d="M490,265 Q500,262 510,270 Q518,285 520,310 L520,400 Q518,408 510,410 L490,410 L490,265" stroke="#2C2420" fill="none" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Windshield divider -->
  <line x1="490" y1="340" x2="520" y2="340" stroke="#2C2420" fill="none" stroke-width="2.5" stroke-linecap="round"/>

  <!-- Driver visible in windshield -->
  <circle cx="505" cy="385" r="8" stroke="#2C2420" fill="none" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
  <line x1="505" y1="393" x2="505" y2="405" stroke="#2C2420" fill="none" stroke-width="2" stroke-linecap="round"/>
  <!-- Steering wheel hint -->
  <path d="M498,400 Q505,395 512,400" stroke="#2C2420" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- ============================================ -->
  <!-- HEADLIGHTS AND DETAILS -->
  <!-- ============================================ -->

  <!-- Front headlights -->
  <circle cx="525" cy="440" r="10" stroke="#2C2420" fill="none" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"/>
  <circle cx="525" cy="440" r="4" stroke="#2C2420" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
  <circle cx="525" cy="480" r="8" stroke="#2C2420" fill="none" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Front bumper -->
  <path d="M515,520 Q520,525 530,525 Q535,525 535,520" stroke="#2C2420" fill="none" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Rear tail light -->
  <rect x="72" y="440" width="8" height="18" rx="3" stroke="#2C2420" fill="none" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
  <rect x="72" y="470" width="8" height="12" rx="3" stroke="#2C2420" fill="none" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Side mirror (front) -->
  <path d="M520,350 L535,345 Q540,345 540,350 L540,360 Q540,365 535,365 L520,360" stroke="#2C2420" fill="none" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Route number display on front -->
  <rect x="493" y="270" width="22" height="16" rx="3" stroke="#2C2420" fill="none" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
  <text x="504" y="283" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#2C2420" stroke="none">100</text>

  <!-- BVG text on side -->
  <text x="300" y="400" text-anchor="middle" font-family="sans-serif" font-size="18" fill="none" stroke="#2C2420" stroke-width="1.5">BVG</text>

  <!-- ============================================ -->
  <!-- WHEELS -->
  <!-- ============================================ -->

  <!-- Front wheel -->
  <circle cx="440" cy="530" r="32" stroke="#2C2420" fill="none" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Wheel hub -->
  <circle cx="440" cy="530" r="14" stroke="#2C2420" fill="none" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Hub cap center -->
  <circle cx="440" cy="530" r="4" stroke="#2C2420" fill="none" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Wheel spokes -->
  <line x1="440" y1="516" x2="440" y2="498" stroke="#2C2420" fill="none" stroke-width="2" stroke-linecap="round"/>
  <line x1="454" y1="530" x2="472" y2="530" stroke="#2C2420" fill="none" stroke-width="2" stroke-linecap="round"/>
  <line x1="440" y1="544" x2="440" y2="562" stroke="#2C2420" fill="none" stroke-width="2" stroke-linecap="round"/>
  <line x1="426" y1="530" x2="408" y2="530" stroke="#2C2420" fill="none" stroke-width="2" stroke-linecap="round"/>

  <!-- Rear wheel -->
  <circle cx="160" cy="530" r="32" stroke="#2C2420" fill="none" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
  <circle cx="160" cy="530" r="14" stroke="#2C2420" fill="none" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
  <circle cx="160" cy="530" r="4" stroke="#2C2420" fill="none" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
  <line x1="160" y1="516" x2="160" y2="498" stroke="#2C2420" fill="none" stroke-width="2" stroke-linecap="round"/>
  <line x1="174" y1="530" x2="192" y2="530" stroke="#2C2420" fill="none" stroke-width="2" stroke-linecap="round"/>
  <line x1="160" y1="544" x2="160" y2="562" stroke="#2C2420" fill="none" stroke-width="2" stroke-linecap="round"/>
  <line x1="146" y1="530" x2="128" y2="530" stroke="#2C2420" fill="none" stroke-width="2" stroke-linecap="round"/>

  <!-- Wheel arches -->
  <path d="M125,520 Q125,495 160,495 Q195,495 195,520" stroke="#2C2420" fill="none" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M405,520 Q405,495 440,495 Q475,495 475,520" stroke="#2C2420" fill="none" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Ground line -->
  <line x1="47" y1="562" x2="548" y2="562" stroke="#2C2420" fill="none" stroke-width="3" stroke-linecap="round"/>

  <!-- ============================================ -->
  <!-- BUS STOP SIGN -->
  <!-- ============================================ -->

  <!-- Post -->
  <rect x="50" y="300" width="6" height="262" stroke="#2C2420" fill="none" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Sign -->
  <circle cx="53" cy="290" r="22" stroke="#2C2420" fill="none" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- H for Haltestelle -->
  <text x="53" y="296" text-anchor="middle" font-family="sans-serif" font-size="22" font-weight="bold" fill="none" stroke="#2C2420" stroke-width="2">H</text>

  <!-- ============================================ -->
  <!-- ROAD DETAILS -->
  <!-- ============================================ -->
  <!-- Dashed center line -->
  <line x1="47" y1="590" x2="90" y2="590" stroke="#2C2420" fill="none" stroke-width="2" stroke-linecap="round" stroke-dasharray="15,10"/>
  <line x1="110" y1="590" x2="548" y2="590" stroke="#2C2420" fill="none" stroke-width="2" stroke-linecap="round" stroke-dasharray="15,10"/>

  <!-- Curb -->
  <line x1="47" y1="620" x2="548" y2="620" stroke="#2C2420" fill="none" stroke-width="2.5" stroke-linecap="round"/>

  <!-- Title label -->
  <text x="297.5" y="670" text-anchor="middle" font-family="sans-serif" font-size="22" fill="#2C2420" stroke="none">Berlin Double-Decker Bus</text>

  <!-- Footer -->
  <text x="297.5" y="820" text-anchor="middle" font-family="sans-serif" font-size="8" fill="#C4B8AB">berlinbabysitter.com</text>
</svg>