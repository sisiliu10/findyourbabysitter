<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 595 842" width="595" height="842" style="background: white">
  <title>Berlin Double-Decker Bus Coloring Page</title>

  <!-- Road -->
  <rect x="20" y="720" width="555" height="60" stroke="#2C2420" fill="none" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Road center line -->
  <line x1="60" y1="750" x2="120" y2="750" stroke="#2C2420" fill="none" stroke-width="4" stroke-linecap="round"/>
  <line x1="160" y1="750" x2="220" y2="750" stroke="#2C2420" fill="none" stroke-width="4" stroke-linecap="round"/>
  <line x1="260" y1="750" x2="320" y2="750" stroke="#2C2420" fill="none" stroke-width="4" stroke-linecap="round"/>
  <line x1="360" y1="750" x2="420" y2="750" stroke="#2C2420" fill="none" stroke-width="4" stroke-linecap="round"/>
  <line x1="460" y1="750" x2="520" y2="750" stroke="#2C2420" fill="none" stroke-width="4" stroke-linecap="round"/>

  <!-- Lower deck body -->
  <path d="M55 450 L55 680 Q55 710, 85 710 L495 710 Q525 710, 525 680 L525 450 Z" stroke="#2C2420" fill="none" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Upper deck body -->
  <path d="M55 200 Q55 170, 85 170 L495 170 Q525 170, 525 200 L525 450 L55 450 Z" stroke="#2C2420" fill="none" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Roof curve -->
  <path d="M75 170 Q297 130, 515 170" stroke="#2C2420" fill="none" stroke-width="5" stroke-linecap="round"/>

  <!-- Deck divider line -->
  <line x1="55" y1="450" x2="525" y2="450" stroke="#2C2420" fill="none" stroke-width="6" stroke-linecap="round"/>

  <!-- Upper deck windows -->
  <rect x="80" y="200" width="70" height="80" rx="8" stroke="#2C2420" fill="none" stroke-width="5"/>
  <rect x="165" y="200" width="70" height="80" rx="8" stroke="#2C2420" fill="none" stroke-width="5"/>
  <rect x="250" y="200" width="70" height="80" rx="8" stroke="#2C2420" fill="none" stroke-width="5"/>
  <rect x="335" y="200" width="70" height="80" rx="8" stroke="#2C2420" fill="none" stroke-width="5"/>
  <rect x="420" y="200" width="75" height="80" rx="8" stroke="#2C2420" fill="none" stroke-width="5"/>

  <!-- Destination sign upper front -->
  <rect x="80" y="310" width="160" height="35" rx="5" stroke="#2C2420" fill="none" stroke-width="4"/>

  <!-- Upper deck side stripe -->
  <line x1="70" y1="370" x2="510" y2="370" stroke="#2C2420" fill="none" stroke-width="3"/>
  <line x1="70" y1="420" x2="510" y2="420" stroke="#2C2420" fill="none" stroke-width="3"/>

  <!-- Lower deck windows -->
  <rect x="80" y="480" width="80" height="75" rx="8" stroke="#2C2420" fill="none" stroke-width="5"/>
  <rect x="250" y="480" width="80" height="75" rx="8" stroke="#2C2420" fill="none" stroke-width="5"/>
  <rect x="420" y="480" width="80" height="75" rx="8" stroke="#2C2420" fill="none" stroke-width="5"/>

  <!-- Lower deck door -->
  <rect x="175" y="500" width="60" height="140" rx="5" stroke="#2C2420" fill="none" stroke-width="5"/>
  <line x1="205" y1="500" x2="205" y2="640" stroke="#2C2420" fill="none" stroke-width="4"/>
  <circle cx="195" cy="575" r="4" fill="#2C2420"/>
  <circle cx="215" cy="575" r="4" fill="#2C2420"/>

  <!-- Second door -->
  <rect x="345" y="500" width="60" height="140" rx="5" stroke="#2C2420" fill="none" stroke-width="5"/>
  <line x1="375" y1="500" x2="375" y2="640" stroke="#2C2420" fill="none" stroke-width="4"/>
  <circle cx="365" cy="575" r="4" fill="#2C2420"/>
  <circle cx="385" cy="575" r="4" fill="#2C2420"/>

  <!-- Headlights -->
  <circle cx="72" cy="620" r="18" stroke="#2C2420" fill="none" stroke-width="5"/>
  <circle cx="510" cy="620" r="18" stroke="#2C2420" fill="none" stroke-width="5"/>

  <!-- Front bumper -->
  <rect x="50" y="660" width="25" height="30" rx="5" stroke="#2C2420" fill="none" stroke-width="4"/>
  <rect x="510" y="660" width="25" height="30" rx="5" stroke="#2C2420" fill="none" stroke-width="4"/>

  <!-- Wheels -->
  <circle cx="140" cy="715" r="35" stroke="#2C2420" fill="none" stroke-width="7"/>
  <circle cx="140" cy="715" r="15" stroke="#2C2420" fill="none" stroke-width="5"/>
  <circle cx="440" cy="715" r="35" stroke="#2C2420" fill="none" stroke-width="7"/>
  <circle cx="440" cy="715" r="15" stroke="#2C2420" fill="none" stroke-width="5"/>

  <!-- Wheel covers -->
  <path d="M100 710 Q140 680, 180 710" stroke="#2C2420" fill="none" stroke-width="5" stroke-linecap="round"/>
  <path d="M400 710 Q440 680, 480 710" stroke="#2C2420" fill="none" stroke-width="5" stroke-linecap="round"/>

  <!-- People in upper deck windows -->
  <!-- Person 1 -->
  <circle cx="115" cy="225" r="10" stroke="#2C2420" fill="none" stroke-width="3"/>
  <line x1="115" y1="235" x2="115" y2="260" stroke="#2C2420" fill="none" stroke-width="3" stroke-linecap="round"/>
  <!-- Person 2 -->
  <circle cx="200" cy="225" r="10" stroke="#2C2420" fill="none" stroke-width="3"/>
  <line x1="200" y1="235" x2="200" y2="260" stroke="#2C2420" fill="none" stroke-width="3" stroke-linecap="round"/>
  <!-- Person 3 waving -->
  <circle cx="370" cy="225" r="10" stroke="#2C2420" fill="none" stroke-width="3"/>
  <line x1="370" y1="235" x2="370" y2="260" stroke="#2C2420" fill="none" stroke-width="3" stroke-linecap="round"/>
  <path d="M380 230 L390 215" stroke="#2C2420" fill="none" stroke-width="3" stroke-linecap="round"/>

  <!-- Bus number "100" on side -->
  <rect x="80" y="660" width="50" height="25" rx="4" stroke="#2C2420" fill="none" stroke-width="3"/>

  <!-- Side mirror -->
  <ellipse cx="48" cy="480" rx="12" ry="8" stroke="#2C2420" fill="none" stroke-width="4"/>

  <!-- Exhaust clouds at back -->
  <circle cx="540" cy="690" r="10" stroke="#2C2420" fill="none" stroke-width="3"/>
  <circle cx="558" cy="680" r="14" stroke="#2C2420" fill="none" stroke-width="3"/>
  <circle cx="572" cy="665" r="10" stroke="#2C2420" fill="none" stroke-width="3"/>

  <text x="297.5" y="810" text-anchor="middle" font-family="sans-serif" font-size="8" fill="#C4B8AB">berlinbabysitter.com</text>
</svg>
