<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 595 842" width="595" height="842" style="background: white">
  <title>Zoo Berlin Animals Coloring Page</title>

  <!-- Ground -->
  <line x1="20" y1="780" x2="575" y2="780" stroke="#2C2420" fill="none" stroke-width="5" stroke-linecap="round"/>

  <!-- ===== ELEPHANT (center) ===== -->
