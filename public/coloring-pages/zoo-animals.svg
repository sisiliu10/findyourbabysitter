  <rect x="270" y="610" width="45" height="120" rx="15" stroke="#2C2420" fill="none" stroke-width="5"/>
  <rect x="340" y="610" width="45" height="120" rx="15" stroke="#2C2420" fill="none" stroke-width="5"/>
  <rect x="395" y="610" width="45" height="120" rx="15" stroke="#2C2420" fill="none" stroke-width="5"/>
  <!-- Tail -->
  <path d="M440 490 C460 480, 470 500, 465 520 L470 530" stroke="#2C2420" fill="none" stroke-width="4" stroke-linecap="round"/>

  <!-- ===== PANDA (left) ===== -->
  <!-- Body -->
  <ellipse cx="80" cy="640" rx="55" ry="70" stroke="#2C2420" fill="none" stroke-width="5"/>
  <!-- Head -->
  <circle cx="80" cy="545" r="42" stroke="#2C2420" fill="none" stroke-width="5"/>
  <!-- Ears -->
  <circle cx="50" cy="510" r="16" stroke="#2C2420" fill="none" stroke-width="5"/>
  <circle cx="110" cy="510" r="16" stroke="#2C2420" fill="none" stroke-width="5"/>
  <!-- Eye patches -->
  <ellipse cx="65" cy="540" rx="14" ry="12" stroke="#2C2420" fill="none" stroke-width="4"/>
  <circle cx="65" cy="540" r="5" fill="#2C2420"/>
  <ellipse cx="95" cy="540" rx="14" ry="12" stroke="#2C2420" fill="none" stroke-width="4"/>
  <circle cx="95" cy="540" r="5" fill="#2C2420"/>
  <!-- Nose -->
  <ellipse cx="80" cy="558" rx="8" ry="5" fill="#2C2420"/>
  <!-- Mouth -->
  <path d="M72 565 Q80 575 88 565" stroke="#2C2420" fill="none" stroke-width="3" stroke-linecap="round"/>
  <!-- Legs -->
  <ellipse cx="52" cy="710" rx="20" ry="25" stroke="#2C2420" fill="none" stroke-width="5"/>
  <ellipse cx="108" cy="710" rx="20" ry="25" stroke="#2C2420" fill="none" stroke-width="5"/>
  <!-- Arms holding bamboo -->
  <path d="M35 600 C20 590, 10 610, 25 625" stroke="#2C2420" fill="none" stroke-width="5" stroke-linecap="round"/>
