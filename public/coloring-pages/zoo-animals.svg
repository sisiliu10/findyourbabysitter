  <!-- Left ear -->
  <path d="M140 340 C100 310, 90 370, 120 400 C110 420, 130 430, 148 410" stroke="#2C2420" fill="none" stroke-width="5" stroke-linecap="round"/>
  <!-- Right ear -->
  <path d="M280 350 C300 320, 310 360, 290 385" stroke="#2C2420" fill="none" stroke-width="5" stroke-linecap="round"/>
  <!-- Eye -->
  <circle cx="225" cy="370" r="8" stroke="#2C2420" fill="#2C2420"/>
  <!-- Trunk -->
  <path d="M175 420 C160 470, 140 520, 130 570 C125 595, 140 610, 160 600 C170 595, 165 570, 158 545" stroke="#2C2420" fill="none" stroke-width="6" stroke-linecap="round"/>
