  <path d="M505 720 L510 735" stroke="#2C2420" fill="none" stroke-width="3" stroke-linecap="round"/>
  <path d="M530" y1="720" stroke="#2C2420" fill="none" stroke-width="3" stroke-linecap="round"/>
  <!-- Lifted leg -->
  <path d="M510 540 L498 580 L510 590" stroke="#2C2420" fill="none" stroke-width="4" stroke-linecap="round"/>
  <!-- Tail feathers -->
  <path d="M545 510 C560 530, 570 520, 565 500" stroke="#2C2420" fill="none" stroke-width="4" stroke-linecap="round"/>
  <path d="M550 520 C568 540, 578 530, 572 510" stroke="#2C2420" fill="none" stroke-width="4" stroke-linecap="round"/>
  <!-- Wing -->
  <path d="M500 460 C490 480, 495 510, 510 520" stroke="#2C2420" fill="none" stroke-width="4" stroke-linecap="round"/>

  <!-- Zoo fence at bottom -->
  <line x1="20" y1="750" x2="575" y2="750" stroke="#2C2420" fill="none" stroke-width="4" stroke-linecap="round"/>
  <line x1="40" y1="750" x2="40" y2="780" stroke="#2C2420" fill="none" stroke-width="4" stroke-linecap="round"/>
  <line x1="80" y1="750" x2="80" y2="780" stroke="#2C2420" fill="none" stroke-width="4" stroke-linecap="round"/>
  <line x1="120" y1="750" x2="120" y2="780" stroke="#2C2420" fill="none" stroke-width="4" stroke-linecap="round"/>
  <line x1="160" y1="750" x2="160" y2="780" stroke="#2C2420" fill="none" stroke-width="4" stroke-linecap="round"/>
  <line x1="200" y1="750" x2="200" y2="780" stroke="#2C2420" fill="none" stroke-width="4" stroke-linecap="round"/>
  <line x1="240" y1="750" x2="240" y2="780" stroke="#2C2420" fill="none" stroke-width="4" stroke-linecap="round"/>
  <line x1="280" y1="750" x2="280" y2="780" stroke="#2C2420" fill="none" stroke-width="4" stroke-linecap="round"/>
  <line x1="320" y1="750" x2="320" y2="780" stroke="#2C2420" fill="none" stroke-width="4" stroke-linecap="round"/>
  <line x1="360" y1="750" x2="360" y2="780" stroke="#2C2420" fill="none" stroke-width="4" stroke-linecap="round"/>
  <line x1="400" y1="750" x2="400" y2="780" stroke="#2C2420" fill="none" stroke-width="4" stroke-linecap="round"/>
  <line x1="440" y1="750" x2="440" y2="780" stroke="#2C2420" fill="none" stroke-width="4" stroke-linecap="round"/>
  <line x1="480" y1="750" x2="480" y2="780" stroke="#2C2420" fill="none" stroke-width="4" stroke-linecap="round"/>
  <line x1="520" y1="750" x2="520" y2="780" stroke="#2C2420" fill="none" stroke-width="4" stroke-linecap="round"/>
  <line x1="560" y1="750" x2="560" y2="780" stroke="#2C2420" fill="none" stroke-width="4" stroke-linecap="round"/>

  <!-- ZOO sign arch -->
  <path d="M180 100 Q297 40, 415 100" stroke="#2C2420" fill="none" stroke-width="6" stroke-linecap="round"/>
  <line x1="180" y1="100" x2="180" y2="150" stroke="#2C2420" fill="none" stroke-width="6" stroke-linecap="round"/>
  <line x1="415" y1="100" x2="415" y2="150" stroke="#2C2420" fill="none" stroke-width="6" stroke-linecap="round"/>
  <!-- ZOO text area -->
  <rect x="250" y="55" width="95" height="35" rx="8" stroke="#2C2420" fill="none" stroke-width="4"/>

  <!-- Trees -->
  <circle cx="50" cy="180" r="40" stroke="#2C2420" fill="none" stroke-width="5"/>
  <circle cx="30" cy="210" r="35" stroke="#2C2420" fill="none" stroke-width="5"/>
  <circle cx="70" cy="215" r="30" stroke="#2C2420" fill="none" stroke-width="5"/>
  <line x1="50" y1="250" x2="50" y2="350" stroke="#2C2420" fill="none" stroke-width="5" stroke-linecap="round"/>

  <text x="297.5" y="825" text-anchor="middle" font-family="sans-serif" font-size="8" fill="#C4B8AB">berlinbabysitter.com</text>
