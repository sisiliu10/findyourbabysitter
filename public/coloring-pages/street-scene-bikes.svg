  <line x1="305" y1="665" x2="330" y2="640" stroke="#2C2420" fill="none" stroke-width="3" stroke-linecap="round"/>
  <line x1="355" y1="665" x2="330" y2="640" stroke="#2C2420" fill="none" stroke-width="3" stroke-linecap="round"/>
  <line x1="330" y1="640" x2="325" y2="620" stroke="#2C2420" fill="none" stroke-width="3" stroke-linecap="round"/>
  <line x1="320" y1="620" x2="335" y2="620" stroke="#2C2420" fill="none" stroke-width="3" stroke-linecap="round"/>
  <line x1="355" y1="665" x2="365" y2="645" stroke="#2C2420" fill="none" stroke-width="3" stroke-linecap="round"/>

