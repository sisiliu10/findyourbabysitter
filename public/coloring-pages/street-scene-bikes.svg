  <path d="M250 575 L240 600" stroke="#2C2420" fill="none" stroke-width="3" stroke-linecap="round"/>
  <path d="M250 575 L260 598" stroke="#2C2420" fill="none" stroke-width="3" stroke-linecap="round"/>

