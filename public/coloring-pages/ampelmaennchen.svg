<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 595 842" width="595" height="842" style="background: white">
  <title>Ampelmaennchen Coloring Page</title>

  <!-- Traffic light pole -->
  <rect x="68" y="200" width="16" height="580" rx="5" stroke="#2C2420" fill="none" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Pole base -->
  <rect x="40" y="770" width="72" height="20" rx="6" stroke="#2C2420" fill="none" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Traffic light housing -->
  <rect x="35" y="80" width="82" height="130" rx="12" stroke="#2C2420" fill="none" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Traffic light hood -->
  <path d="M30 80 L102 80 L110 65 L22 65 Z" stroke="#2C2420" fill="none" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Red light circle -->
  <circle cx="76" cy="118" r="25" stroke="#2C2420" fill="none" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Green light circle (with Ampelmännchen inside) -->
  <circle cx="76" cy="178" r="25" stroke="#2C2420" fill="none" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- ===== Large Ampelmännchen character ===== -->

  <!-- Hat -->
  <ellipse cx="340" cy="105" rx="80" ry="20" stroke="#2C2420" fill="none" stroke-width="7" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M300 105 L300 65 Q300 35, 340 35 Q380 35, 380 65 L380 105" stroke="#2C2420" fill="none" stroke-width="7" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Head -->
  <circle cx="340" cy="160" r="50" stroke="#2C2420" fill="none" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Eyes -->
  <circle cx="320" cy="150" r="8" stroke="#2C2420" fill="#2C2420"/>
  <circle cx="360" cy="150" r="8" stroke="#2C2420" fill="#2C2420"/>
  <!-- Smile -->
  <path d="M318 175 Q340 198 362 175" stroke="#2C2420" fill="none" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Nose -->
  <circle cx="340" cy="162" r="5" stroke="#2C2420" fill="#2C2420"/>

  <!-- Body (round torso) -->
  <ellipse cx="340" cy="320" rx="85" ry="110" stroke="#2C2420" fill="none" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Buttons -->
  <circle cx="340" cy="270" r="8" stroke="#2C2420" fill="none" stroke-width="5"/>
  <circle cx="340" cy="310" r="8" stroke="#2C2420" fill="none" stroke-width="5"/>
  <circle cx="340" cy="350" r="8" stroke="#2C2420" fill="none" stroke-width="5"/>

  <!-- Left arm (stretched out, walking pose) -->
  <path d="M260 270 C210 250, 165 260, 140 290 Q125 310, 135 325" stroke="#2C2420" fill="none" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Left hand -->
  <circle cx="135" cy="330" r="18" stroke="#2C2420" fill="none" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Right arm (stretched back) -->
  <path d="M420 270 C465 255, 510 270, 530 300 Q545 320, 535 338" stroke="#2C2420" fill="none" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Right hand -->
  <circle cx="535" cy="342" r="18" stroke="#2C2420" fill="none" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Left leg (striding forward) -->
  <path d="M300 420 L220 560 L180 660 Q170 690, 195 700" stroke="#2C2420" fill="none" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Left foot -->
  <ellipse cx="215" cy="705" rx="50" ry="22" stroke="#2C2420" fill="none" stroke-width="7" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Right leg (behind) -->
  <path d="M375 420 L440 560 L480 660 Q490 690, 465 700" stroke="#2C2420" fill="none" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Right foot -->
  <ellipse cx="445" cy="705" rx="50" ry="22" stroke="#2C2420" fill="none" stroke-width="7" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Ground line -->
  <line x1="30" y1="790" x2="565" y2="790" stroke="#2C2420" fill="none" stroke-width="6" stroke-linecap="round"/>

  <!-- Motion lines behind the walking figure -->
  <line x1="530" y1="350" x2="565" y2="345" stroke="#2C2420" fill="none" stroke-width="4" stroke-linecap="round"/>
  <line x1="535" y1="380" x2="570" y2="378" stroke="#2C2420" fill="none" stroke-width="4" stroke-linecap="round"/>
  <line x1="530" y1="410" x2="565" y2="412" stroke="#2C2420" fill="none" stroke-width="4" stroke-linecap="round"/>

  <text x="297.5" y="825" text-anchor="middle" font-family="sans-serif" font-size="8" fill="#C4B8AB">berlinbabysitter.com</text>
</svg>
