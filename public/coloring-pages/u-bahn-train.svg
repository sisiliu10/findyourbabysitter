<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 595 842" width="595" height="842" style="background: white">
  <title>U-Bahn Train Coloring Page</title>

  <!-- Track/rail at bottom -->
  <line x1="20" y1="720" x2="575" y2="720" stroke="#2C2420" fill="none" stroke-width="7" stroke-linecap="round"/>
  <line x1="20" y1="740" x2="575" y2="740" stroke="#2C2420" fill="none" stroke-width="7" stroke-linecap="round"/>
  <!-- Crossties -->
  <line x1="60" y1="720" x2="60" y2="740" stroke="#2C2420" fill="none" stroke-width="5" stroke-linecap="round"/>
  <line x1="130" y1="720" x2="130" y2="740" stroke="#2C2420" fill="none" stroke-width="5" stroke-linecap="round"/>
  <line x1="200" y1="720" x2="200" y2="740" stroke="#2C2420" fill="none" stroke-width="5" stroke-linecap="round"/>
  <line x1="270" y1="720" x2="270" y2="740" stroke="#2C2420" fill="none" stroke-width="5" stroke-linecap="round"/>
  <line x1="340" y1="720" x2="340" y2="740" stroke="#2C2420" fill="none" stroke-width="5" stroke-linecap="round"/>
  <line x1="410" y1="720" x2="410" y2="740" stroke="#2C2420" fill="none" stroke-width="5" stroke-linecap="round"/>
  <line x1="480" y1="720" x2="480" y2="740" stroke="#2C2420" fill="none" stroke-width="5" stroke-linecap="round"/>
  <line x1="540" y1="720" x2="540" y2="740" stroke="#2C2420" fill="none" stroke-width="5" stroke-linecap="round"/>

  <!-- Train body - big rounded rectangle -->
  <path d="M60 250 L60 640 Q60 680, 100 680 L490 680 Q530 680, 530 640 L530 250 Q530 210, 490 210 L100 210 Q60 210, 60 250 Z" stroke="#2C2420" fill="none" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Roof line -->
  <path d="M100 210 Q297 170, 490 210" stroke="#2C2420" fill="none" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- U sign on front -->
  <circle cx="297" cy="240" r="30" stroke="#2C2420" fill="none" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M283 228 L283 248 Q283 258, 297 258 Q311 258, 311 248 L311 228" stroke="#2C2420" fill="none" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Destination sign -->
  <rect x="180" y="278" width="230" height="42" rx="8" stroke="#2C2420" fill="none" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Big windows -->
  <rect x="95" y="350" width="140" height="120" rx="15" stroke="#2C2420" fill="none" stroke-width="7" stroke-linecap="round" stroke-linejoin="round"/>
  <rect x="355" y="350" width="140" height="120" rx="15" stroke="#2C2420" fill="none" stroke-width="7" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Center door -->
  <rect x="258" y="380" width="74" height="200" rx="8" stroke="#2C2420" fill="none" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>
  <line x1="295" y1="380" x2="295" y2="580" stroke="#2C2420" fill="none" stroke-width="5" stroke-linecap="round"/>
  <!-- Door handle dots -->
  <circle cx="282" cy="490" r="5" stroke="#2C2420" fill="#2C2420"/>
  <circle cx="308" cy="490" r="5" stroke="#2C2420" fill="#2C2420"/>

  <!-- Bumper/lower panel line -->
  <line x1="80" y1="620" x2="510" y2="620" stroke="#2C2420" fill="none" stroke-width="5" stroke-linecap="round"/>

  <!-- Headlights -->
  <circle cx="100" cy="650" r="18" stroke="#2C2420" fill="none" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>
  <circle cx="490" cy="650" r="18" stroke="#2C2420" fill="none" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Wheels -->
  <circle cx="150" cy="710" r="28" stroke="#2C2420" fill="none" stroke-width="7" stroke-linecap="round" stroke-linejoin="round"/>
  <circle cx="150" cy="710" r="10" stroke="#2C2420" fill="none" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
  <circle cx="297" cy="710" r="28" stroke="#2C2420" fill="none" stroke-width="7" stroke-linecap="round" stroke-linejoin="round"/>
  <circle cx="297" cy="710" r="10" stroke="#2C2420" fill="none" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
  <circle cx="440" cy="710" r="28" stroke="#2C2420" fill="none" stroke-width="7" stroke-linecap="round" stroke-linejoin="round"/>
  <circle cx="440" cy="710" r="10" stroke="#2C2420" fill="none" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Smiling face in left window -->
  <circle cx="145" cy="400" r="5" stroke="#2C2420" fill="#2C2420"/>
  <circle cx="175" cy="400" r="5" stroke="#2C2420" fill="#2C2420"/>
  <path d="M140 420 Q160 438 180 420" stroke="#2C2420" fill="none" stroke-width="4" stroke-linecap="round"/>

  <!-- Smiling face in right window -->
  <circle cx="405" cy="400" r="5" stroke="#2C2420" fill="#2C2420"/>
  <circle cx="435" cy="400" r="5" stroke="#2C2420" fill="#2C2420"/>
  <path d="M400 420 Q420 438 440 420" stroke="#2C2420" fill="none" stroke-width="4" stroke-linecap="round"/>

  <!-- Tunnel arch at top -->
  <path d="M20 180 Q297 40, 575 180" stroke="#2C2420" fill="none" stroke-width="7" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M20 160 Q297 20, 575 160" stroke="#2C2420" fill="none" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Ground level -->
  <line x1="20" y1="780" x2="575" y2="780" stroke="#2C2420" fill="none" stroke-width="5" stroke-linecap="round"/>

  <text x="297.5" y="825" text-anchor="middle" font-family="sans-serif" font-size="8" fill="#C4B8AB">berlinbabysitter.com</text>
</svg>
