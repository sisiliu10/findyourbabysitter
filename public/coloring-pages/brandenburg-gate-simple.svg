<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 595 842" width="595" height="842" style="background: white">
  <title>Brandenburg Gate Coloring Page</title>

  <!-- Ground -->
  <line x1="20" y1="780" x2="575" y2="780" stroke="#2C2420" fill="none" stroke-width="5" stroke-linecap="round"/>

  <!-- Base platform -->
  <rect x="45" y="740" width="505" height="40" rx="3" stroke="#2C2420" fill="none" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Column 1 -->
  <rect x="65" y="280" width="48" height="460" rx="4" stroke="#2C2420" fill="none" stroke-width="5"/>
  <!-- Column base -->
  <rect x="58" y="700" width="62" height="40" rx="3" stroke="#2C2420" fill="none" stroke-width="4"/>
  <!-- Column capital -->
  <rect x="58" y="270" width="62" height="20" rx="3" stroke="#2C2420" fill="none" stroke-width="4"/>

  <!-- Column 2 -->
  <rect x="148" y="280" width="48" height="460" rx="4" stroke="#2C2420" fill="none" stroke-width="5"/>
  <rect x="141" y="700" width="62" height="40" rx="3" stroke="#2C2420" fill="none" stroke-width="4"/>
  <rect x="141" y="270" width="62" height="20" rx="3" stroke="#2C2420" fill="none" stroke-width="4"/>

  <!-- Column 3 -->
  <rect x="233" y="280" width="48" height="460" rx="4" stroke="#2C2420" fill="none" stroke-width="5"/>
  <rect x="226" y="700" width="62" height="40" rx="3" stroke="#2C2420" fill="none" stroke-width="4"/>
  <rect x="226" y="270" width="62" height="20" rx="3" stroke="#2C2420" fill="none" stroke-width="4"/>

  <!-- Column 4 -->
  <rect x="314" y="280" width="48" height="460" rx="4" stroke="#2C2420" fill="none" stroke-width="5"/>
  <rect x="307" y="700" width="62" height="40" rx="3" stroke="#2C2420" fill="none" stroke-width="4"/>
  <rect x="307" y="270" width="62" height="20" rx="3" stroke="#2C2420" fill="none" stroke-width="4"/>

  <!-- Column 5 -->
  <rect x="399" y="280" width="48" height="460" rx="4" stroke="#2C2420" fill="none" stroke-width="5"/>
  <rect x="392" y="700" width="62" height="40" rx="3" stroke="#2C2420" fill="none" stroke-width="4"/>
  <rect x="392" y="270" width="62" height="20" rx="3" stroke="#2C2420" fill="none" stroke-width="4"/>

  <!-- Column 6 -->
  <rect x="482" y="280" width="48" height="460" rx="4" stroke="#2C2420" fill="none" stroke-width="5"/>
  <rect x="475" y="700" width="62" height="40" rx="3" stroke="#2C2420" fill="none" stroke-width="4"/>
  <rect x="475" y="270" width="62" height="20" rx="3" stroke="#2C2420" fill="none" stroke-width="4"/>

  <!-- Entablature (the horizontal beam above columns) -->
  <rect x="45" y="240" width="505" height="35" rx="3" stroke="#2C2420" fill="none" stroke-width="5"/>

  <!-- Attic (the upper solid wall) -->
  <rect x="55" y="160" width="485" height="80" rx="3" stroke="#2C2420" fill="none" stroke-width="5"/>
  <!-- Decorative band on attic -->
  <line x1="70" y1="195" x2="525" y2="195" stroke="#2C2420" fill="none" stroke-width="3"/>
  <line x1="70" y1="210" x2="525" y2="210" stroke="#2C2420" fill="none" stroke-width="3"/>

  <!-- Triangular pediment above center section -->
  <path d="M200 160 L297 110 L395 160" stroke="#2C2420" fill="none" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Quadriga base platform -->
  <rect x="230" y="82" width="135" height="28" rx="4" stroke="#2C2420" fill="none" stroke-width="4"/>

  <!-- Quadriga (simplified chariot with 4 horses) -->
  <!-- Horse bodies (simplified) -->
  <path d="M248 80 C248 60, 255 45, 258 35 L262 45 C265 40, 270 42, 268 50 L265 60 C268 55, 275 52, 278 58 L275 68 Q270 75, 265 80" stroke="#2C2420" fill="none" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M280 80 C280 60, 287 45, 290 35 L294 45 C297 40, 302 42, 300 50 L297 60 C300 55, 307 52, 310 58 L307 68 Q302 75, 297 80" stroke="#2C2420" fill="none" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M312 80 C312 60, 319 45, 322 35 L326 45 C329 40, 334 42, 332 50 L329 60 C332 55, 339 52, 342 58 L339 68 Q334 75, 329 80" stroke="#2C2420" fill="none" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M340 80 C340 60, 347 45, 350 35 L354 45 C357 40, 362 42, 360 50 L357 60 C360 55, 367 52, 370 58 L367 68 Q362 75, 357 80" stroke="#2C2420" fill="none" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Victory figure with cross -->
  <line x1="297" y1="35" x2="297" y2="8" stroke="#2C2420" fill="none" stroke-width="4" stroke-linecap="round"/>
  <line x1="288" y1="18" x2="306" y2="18" stroke="#2C2420" fill="none" stroke-width="4" stroke-linecap="round"/>

  <!-- Passageway arches between columns -->
  <path d="M120 450 Q148 410, 172 450" stroke="#2C2420" fill="none" stroke-width="3" stroke-linecap="round"/>
  <path d="M200 450 Q233 410, 257 450" stroke="#2C2420" fill="none" stroke-width="3" stroke-linecap="round"/>
  <path d="M290 450 Q314 390, 338 450" stroke="#2C2420" fill="none" stroke-width="4" stroke-linecap="round"/>
  <path d="M370 450 Q399 410, 423 450" stroke="#2C2420" fill="none" stroke-width="3" stroke-linecap="round"/>
  <path d="M453 450 Q482 410, 506 450" stroke="#2C2420" fill="none" stroke-width="3" stroke-linecap="round"/>

  <!-- Small trees flanking the gate -->
  <circle cx="25" cy="700" r="25" stroke="#2C2420" fill="none" stroke-width="4"/>
  <line x1="25" y1="725" x2="25" y2="780" stroke="#2C2420" fill="none" stroke-width="4" stroke-linecap="round"/>
  <circle cx="570" cy="700" r="25" stroke="#2C2420" fill="none" stroke-width="4"/>
  <line x1="570" y1="725" x2="570" y2="780" stroke="#2C2420" fill="none" stroke-width="4" stroke-linecap="round"/>

  <text x="297.5" y="825" text-anchor="middle" font-family="sans-serif" font-size="8" fill="#C4B8AB">berlinbabysitter.com</text>
</svg>
