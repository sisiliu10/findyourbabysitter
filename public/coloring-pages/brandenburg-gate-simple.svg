  <rect x="330" y="660" width="40" height="20" rx="2" stroke="#2C2420" fill="none" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"/>
  <rect x="334" y="340" width="32" height="320" stroke="#2C2420" fill="none" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"/>
  <rect x="328" y="325" width="44" height="15" rx="2" stroke="#2C2420" fill="none" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"/>
  <line x1="344" y1="345" x2="344" y2="655" stroke="#2C2420" fill="none" stroke-width="2" stroke-linecap="round"/>
  <line x1="356" y1="345" x2="356" y2="655" stroke="#2C2420" fill="none" stroke-width="2" stroke-linecap="round"/>

