  <rect x="124" y="340" width="32" height="320" stroke="#2C2420" fill="none" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Capital -->
  <rect x="118" y="325" width="44" height="15" rx="2" stroke="#2C2420" fill="none" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Column fluting lines -->
  <line x1="134" y1="345" x2="134" y2="655" stroke="#2C2420" fill="none" stroke-width="2" stroke-linecap="round"/>
  <line x1="146" y1="345" x2="146" y2="655" stroke="#2C2420" fill="none" stroke-width="2" stroke-linecap="round"/>

