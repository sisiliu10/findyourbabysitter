  <line x1="216" y1="345" x2="216" y2="655" stroke="#2C2420" fill="none" stroke-width="2" stroke-linecap="round"/>

  <!-- Column 3 -->
  <rect x="260" y="660" width="40" height="20" rx="2" stroke="#2C2420" fill="none" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"/>
  <rect x="264" y="340" width="32" height="320" stroke="#2C2420" fill="none" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"/>
  <rect x="258" y="325" width="44" height="15" rx="2" stroke="#2C2420" fill="none" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"/>
  <line x1="274" y1="345" x2="274" y2="655" stroke="#2C2420" fill="none" stroke-width="2" stroke-linecap="round"/>
  <line x1="286" y1="345" x2="286" y2="655" stroke="#2C2420" fill="none" stroke-width="2" stroke-linecap="round"/>

