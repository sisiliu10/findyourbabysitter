  <rect x="398" y="325" width="44" height="15" rx="2" stroke="#2C2420" fill="none" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"/>
  <line x1="414" y1="345" x2="414" y2="655" stroke="#2C2420" fill="none" stroke-width="2" stroke-linecap="round"/>
  <line x1="426" y1="345" x2="426" y2="655" stroke="#2C2420" fill="none" stroke-width="2" stroke-linecap="round"/>

