  <ellipse cx="190" cy="130" rx="55" ry="60" stroke="#2C2420" fill="none" stroke-width="7"/>
  <ellipse cx="190" cy="135" rx="30" ry="35" stroke="#2C2420" fill="none" stroke-width="5"/>
  <!-- Right Ear -->
