  <circle cx="245" cy="82" r="6" stroke="#2C2420" fill="none" stroke-width="4"/>
  <circle cx="297" cy="82" r="6" stroke="#2C2420" fill="none" stroke-width="4"/>
  <circle cx="349" cy="82" r="6" stroke="#2C2420" fill="none" stroke-width="4"/>

