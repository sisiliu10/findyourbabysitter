  <ellipse cx="354" cy="730" rx="16" ry="12" stroke="#2C2420" fill="none" stroke-width="5"/>
  <ellipse cx="389" cy="726" rx="16" ry="12" stroke="#2C2420" fill="none" stroke-width="5"/>
