<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 595 842" width="595" height="842" style="background: white">
  <title>Berlin TV Tower Coloring Page</title>

  <!-- Antenna tip ball -->
  <circle cx="297" cy="38" r="12" stroke="#2C2420" fill="none" stroke-width="7" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Antenna spike -->
  <line x1="297" y1="50" x2="297" y2="155" stroke="#2C2420" fill="none" stroke-width="7" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Small antenna cross bars -->
  <line x1="278" y1="85" x2="316" y2="85" stroke="#2C2420" fill="none" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
  <line x1="282" y1="120" x2="312" y2="120" stroke="#2C2420" fill="none" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Upper tapered neck to sphere -->
  <path d="M285 155 L278 200" stroke="#2C2420" fill="none" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M309 155 L316 200" stroke="#2C2420" fill="none" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>

