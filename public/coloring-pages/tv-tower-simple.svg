  <line x1="261" y1="480" x2="333" y2="480" stroke="#2C2420" fill="none" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
  <line x1="256" y1="560" x2="338" y2="560" stroke="#2C2420" fill="none" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
  <line x1="251" y1="640" x2="343" y2="640" stroke="#2C2420" fill="none" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Base platform -->
  <path d="M210 720 L244 720 L350 720 L384 720" stroke="#2C2420" fill="none" stroke-width="7" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Base structure - flared legs -->
