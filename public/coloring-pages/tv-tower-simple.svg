  <circle cx="297" cy="310" r="120" stroke="#2C2420" fill="none" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Observation deck ring -->
  <ellipse cx="297" cy="280" rx="120" ry="22" stroke="#2C2420" fill="none" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Second ring lower -->
