  <circle cx="297" cy="300" r="15" stroke="#2C2420" fill="none" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
  <circle cx="334" cy="300" r="15" stroke="#2C2420" fill="none" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Shaft - tapers down -->
  <path d="M265 425 L258 530 L250 630 L244 720" stroke="#2C2420" fill="none" stroke-width="7" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M329 425 L336 530 L344 630 L350 720" stroke="#2C2420" fill="none" stroke-width="7" stroke-linecap="round" stroke-linejoin="round"/>

