  <path d="M384 720 L424 770 L444 790" stroke="#2C2420" fill="none" stroke-width="7" stroke-linecap="round" stroke-linejoin="round"/>
  <line x1="150" y1="790" x2="444" y2="790" stroke="#2C2420" fill="none" stroke-width="7" stroke-linecap="round" stroke-linejoin="round"/>

