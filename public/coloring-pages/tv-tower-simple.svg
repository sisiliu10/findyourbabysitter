  <circle cx="510" cy="60" r="35" stroke="#2C2420" fill="none" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>
  <line x1="510" y1="15" x2="510" y2="5" stroke="#2C2420" fill="none" stroke-width="5" stroke-linecap="round"/>
  <line x1="510" y1="105" x2="510" y2="115" stroke="#2C2420" fill="none" stroke-width="5" stroke-linecap="round"/>
  <line x1="465" y1="60" x2="455" y2="60" stroke="#2C2420" fill="none" stroke-width="5" stroke-linecap="round"/>
  <line x1="555" y1="60" x2="565" y2="60" stroke="#2C2420" fill="none" stroke-width="5" stroke-linecap="round"/>
  <line x1="478" y1="28" x2="471" y2="21" stroke="#2C2420" fill="none" stroke-width="5" stroke-linecap="round"/>
  <line x1="542" y1="92" x2="549" y2="99" stroke="#2C2420" fill="none" stroke-width="5" stroke-linecap="round"/>
  <line x1="478" y1="92" x2="471" y2="99" stroke="#2C2420" fill="none" stroke-width="5" stroke-linecap="round"/>
  <line x1="542" y1="28" x2="549" y2="21" stroke="#2C2420" fill="none" stroke-width="5" stroke-linecap="round"/>

  <!-- Trees at base -->
  <path d="M80 790 L80 730 M60 760 Q80 720 100 760 M55 740 Q80 695 105 740" stroke="#2C2420" fill="none" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M510 790 L510 730 M490 760 Q510 720 530 760 M485 740 Q510 695 535 740" stroke="#2C2420" fill="none" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>

  <text x="297.5" y="825" text-anchor="middle" font-family="sans-serif" font-size="8" fill="#C4B8AB">berlinbabysitter.com</text>
</svg>
